name: Publish npm

# Publishes @postq/sdk to npmjs.com when you push a tag like `js-v0.2.0`.
# The tag version MUST match the version in sdks/js/package.json.
#
# Required repo secret: NPM_TOKEN (granular access token, scope @postq, read+write).

on:
  push:
    tags:
      - "js-v*"
  workflow_dispatch:

jobs:
  publish:
    name: Publish @postq/sdk to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/js

    permissions:
      contents: read
      id-token: write # for npm provenance attestation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: sdks/js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/js-v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/js-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
