name: Publish PyPI

# Publishes postq-sdk to PyPI when you push a tag like `py-v0.2.0`.
# The tag version MUST match the version in sdks/python/pyproject.toml.
#
# Auth: PyPI Trusted Publishing (no token needed). Configure once at
# https://pypi.org/manage/account/publishing/ with:
#   - Owner:        PostQDev
#   - Repository:   postq-sdk-all
#   - Workflow:     publish-pypi.yml
#   - Environment:  pypi

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:

jobs:
  build:
    name: Build Python distribution
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify pyproject.toml version matches tag
        if: startsWith(github.ref, 'refs/tags/py-v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/py-v}"
          PKG_VERSION=$(python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: |
          pip install -e ".[dev]"
          python -m pytest

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: sdks/python/dist/
          if-no-files-found: error

  publish:
    name: Publish postq-sdk to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/postq-sdk

    permissions:
      id-token: write # for PyPI Trusted Publishing (OIDC)

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
